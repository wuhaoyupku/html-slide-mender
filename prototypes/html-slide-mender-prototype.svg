      .label { font-size: 13px; fill: #526071; }
      .tooltext { font-size: 13px; fill: #253044; font-weight: 600; }
      .title { font-size: 20px; fill: #1f2937; font-weight: 700; }
      .muted { fill: #6a7688; }
